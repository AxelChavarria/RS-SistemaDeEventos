<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Evento - tecEventos</title>
    
    <link rel="stylesheet" href="../../public/css/base.css">
    <link rel="stylesheet" href="../../public/css/layout.css">
    <link rel="stylesheet" href="../../public/css/componentes.css">
    <link rel="stylesheet" href="../../public/css/responsive.css">
</head>
<body class="cancelar-evento-page">

    <header class="navbar">
        <div class="navbar-contenido">
            <div class="navbar-izquierda">
                <h1 class="logo-sistema">tecEventos</h1>
                <nav class="menu-nav">
                    <a href="inicio-organizador.html">Inicio</a>
                    <a href="eventos-organizador.html">Eventos</a>
                    <a href="mis-inscripciones.html">Mis Inscritos</a>
                    <a href="mis-eventos.html">Mis Eventos</a>
                    <a href="crear-evento.html">Crear Evento</a>
                    <a href="anuncios-organizador.html">Ver Anuncios</a>
                </nav>
            </div>
            <div class="navbar-derecha">
                <img src="../../public/assets/iconos/icono-usuario.png" alt="Perfil" class="icono-perfil">
            </div>
        </div>
    </header>

    <main class="container seccion">
        
        <header class="seccion-encabezado">
            <h2 class="titulo-vista" style="color: #003366; text-transform: uppercase;">¿CANCELAR EVENTO?</h2>
        </header>

        <section class="formulario-cancelacion" style="margin-top: 30px;">

            <!-- FORM: form-cancelar-evento -->
            <form id="form-cancelar-evento">
                <input type="hidden" name="evento_id" value="ID_DEL_EVENTO">

                <div class="info-label" style="margin-bottom: 15px;">
                    <h3 style="color: #003366; font-size: 1.2rem;">Motivo de Cancelación:</h3>
                </div>

                <div class="contenedor-mensaje" style="margin-bottom: 30px;">
                    <textarea
                        id="motivo-cancelacion"
                        name="motivo_cancelacion"
                        class="input-control"
                        rows="15"
                        style="width: 100%; border: 1px solid #000; padding: 15px; resize: none;"
                        placeholder="Explique brevemente los motivos de la cancelación..."></textarea>
                </div>

                <div class="detalle-evento-acciones">
                    <button type="submit" class="btn btn-primary">Confirmar Solicitud</button>
                    <button type="button" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </section>

    </main>


    <script type="module" src="../../main.js"></script>
    <!-- <script src="/js/main.js"></script> -->

</body>
</html>
