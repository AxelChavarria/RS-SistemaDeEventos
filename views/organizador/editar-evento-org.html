<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Evento Pendiente - tecEventos</title>
    
    <link rel="stylesheet" href="../../public/css/base.css">
    <link rel="stylesheet" href="../../public/css/layout.css">
    <link rel="stylesheet" href="../../public/css/componentes.css">
</head>
<body class="editar-evento-page">

    <header class="navbar">
        <div class="navbar-contenido">
            <div class="navbar-izquierda">
                <h1 class="logo-sistema">tecEventos</h1>
                <nav class="menu-nav">
                    <a href="inicio-organizador.html">Inicio</a>
                    <a href="eventos-organizador.html">Eventos</a>
                    <a href="mis-inscritos.html">Mis Inscritos</a>
                    <a href="mis-eventos.html">Mis Eventos</a>
                    <a href="crear-evento.html">Crear Evento</a>
                    <a href="anuncios-organizador.html">Ver Anuncios</a>
                </nav>
            </div>
            <div class="navbar-derecha">
                <a href="mi-cuenta-org.html"><img src="../../public/assets/iconos/icono-usuario.png" alt="Perfil" class="icono-perfil"></a>
            </div>
        </div>
    </header>

    <main class="container seccion">
        <header class="seccion-encabezado">
            <h2 class="titulo-vista" style="color: #003366; font-weight: bold; font-size: 1.8rem; margin-bottom: 30px;">Información del Evento</h2>
        </header>

        <form action="/api/eventos/actualizar" method="POST" class="formulario-edicion">
            
            <div class="campo-grupo" style="margin-bottom: 20px;">
                <label class="form-label" style="color: #003366; font-weight: bold;">Título del Evento:</label>
                <input type="text" class="input-control" value="TítuloDeEjemplo" style="border: 1px solid #000; padding: 5px; width: 250px;">
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px;">
                <label class="form-label" style="color: #003366; font-weight: bold; display: block;">Descripción:</label>
                <textarea class="input-control" rows="6" style="width: 100%; max-width: 600px; border: 1px solid #000; padding: 10px; resize: none;">Contenido actual de la descripción...</textarea>
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <label class="form-label" style="color: #003366; font-weight: bold;">Categoría:</label>
                <select class="input-control" style="border: 1px solid #000; padding: 5px; border-radius: 5px;">
                    <option value="academico">Categoría</option>
                    <option value="cultural">Cultural</option>
                    <option value="deportivo">Deportivo</option>
                </select>
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px;">
                <p style="color: #003366; font-weight: bold;">Unidad Organizadora: <span style="font-weight: normal; color: #333; margin-left: 10px;">EjemploDeUnidadOrganizadora</span></p>
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <label class="form-label" style="color: #003366; font-weight: bold;">Fecha:</label>
                <input type="text" class="input-control" value="XX/XX/XX" style="border: 1px solid #000; padding: 5px; width: 120px;">
            </div>
                
            <div class="campo-grupo" style="margin-bottom: 20px;">
                <p style="color: #003366; font-weight: bold;">Hora: <span style="font-weight: normal; color: #333; margin-left: 10px;">XX:XX am/pm</span></p>
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <label class="form-label" style="color: #003366; font-weight: bold;">Modalidad:</label>
                <select class="input-control" style="border: 1px solid #000; padding: 5px; border-radius: 5px;">
                    <option value="presencial">Modalidad</option>
                    <option value="virtual">Virtual</option>
                </select>
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <label class="form-label" style="color: #003366; font-weight: bold;">Cupo Máximo:</label>
                <input type="text" class="input-control" value="XY" style="border: 1px solid #000; padding: 5px; width: 50px; text-align: center;">
            </div>

            <div class="campo-grupo" style="margin-bottom: 40px; display: flex; align-items: center; gap: 10px;">
                <label class="form-label" style="color: #003366; font-weight: bold;">Lugar:</label>
                <input type="text" class="input-control" value="Lugar Físico/ Enlace virtual" style="border: 1px solid #000; padding: 5px; width: 300px;">
            </div>

            <div class="detalle-evento-acciones" style="justify-content: flex-start; gap: 30px;">
                <button type="submit" class="btn btn-primary" style="background-color: #d1d9ff; color: #003366; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px;">Guardar Cambios</button>
                <button type="button" class="btn btn-secondary" style="background-color: #d1d9ff; color: #003366; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px;">Cancelar</button>
            </div>

        </form>
    </main>

</body>
</html>
