<body class="editar-cuenta-page">

    <header class="navbar">
        <div class="navbar-contenido">
            <div class="navbar-izquierda">
                <h1 class="logo-sistema">tecEventos</h1>

                <nav class="menu-nav">
                    <a href="inicio-estudiante.html">Inicio</a>
                    <a href="eventos.html">Eventos</a>
                    <a href="mis-inscripciones.html">Mis Inscritos</a>
                    <a href="anuncios.html">Ver Anuncios</a>
                </nav>
            </div>

            <div class="navbar-derecha">
                <a href="mi-cuenta.html"><img src="../../public/assets/iconos/icono-usuario.png" alt="Perfil" class="icono-perfil"></a>
            </div>
        </div>
    </header>

    <main class="seccion cuenta-main">

        <section class="seccion">
            <h2 class="titulo-detalle-evento">Editar mi cuenta</h2>
        </section>

        <!--
            FORM DE EDICION DE PERFIL
            IMPORTANTE:
            Este form debe llenarse luego con los datos reales del usuario
            autenticado y permitir actualizar su informacion.
        -->
        <section class="detalle-cuenta-contenedor">

            <!-- FORM: form-editar-cuenta -->
            <form id="form-editar-cuenta" method="post">

                <div id="contenedor-editar-cuenta">

                    <h3 class="titulo-campo-cuenta">Nombre de usuario</h3>
                    <p>example.1@estudiantec/itcr.cr</p>

                    <h3 class="titulo-campo-cuenta">Nombre</h3>
                    <p>Maria</p>

                    <h3 class="titulo-campo-cuenta">Apellidos</h3>
                    <p>Rodriguez Perez</p>

                    <h3 class="titulo-campo-cuenta">Correo electrínico</h3>
                    <p>example.1@estudiantec/itcr.cr</p>

                    <h3 class="titulo-campo-cuenta">Página Web</h3>
                    <div class="form-group">
                        <input
                            type="text"
                            id="pagina_web"
                            name="pagina_web"
                            class="input-control"
                            placeholder="Ingrese su página web"
                        >
                    </div>

                    <h3 class="titulo-campo-cuenta">Biografia</h3>
                    <div class="form-group">
                        <textarea
                            id="biografia"
                            name="biografia"
                            class="textarea-control"
                            placeholder="Ingrese su biografia"
                        ></textarea>
                    </div>

                    <h3 class="titulo-campo-cuenta">Idioma</h3>
                    <p>Español(ES)</p>

                    <div class="detalle-evento-acciones">
                        <button type="submit" class="btn btn-light">Aceptar</button>
                        <a href="mi-cuenta.html" class="btn btn-light">Cancelar</a>
                    </div>

                </div>

            </form>

        </section>

    </main>

    <script src="../../public/js/main.js"></script>
    <!-- <script src="/js/main.js"></script> -->

</body>
</html>
