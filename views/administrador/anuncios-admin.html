<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncios admin - tecEventos</title>
    
    <link rel="stylesheet" href="../../public/css/base.css">
    <link rel="stylesheet" href="../../public/css/layout.css">
    <link rel="stylesheet" href="../../public/css/componentes.css">
    <link rel="stylesheet" href="../../public/css/paginas.css">
    <link rel="stylesheet" href="../../public/css/responsive.css">
</head>
<body class="admin-anuncios-page">

    <header class="navbar">
        <div class="navbar-contenido">
            <div class="navbar-izquierda">
                <h1 class="logo-sistema">tecEventos</h1>
                <nav class="menu-nav">
                    <a href="inicio-admin.html">Inicio</a>
                    <a href="eventos-admin.html">Eventos</a>
                    <a href="organizadores.html">Organizadores</a>
                    <a href="generar-informe.html">Reportes</a>
                    <a href="anuncios-admin.html">Anuncios</a>
                    <a href="moderacion.html">Moderación</a>
                </nav>
            </div>
            <div class="navbar-derecha">
                <img src="../../public/assets/iconos/icono-usuario.png" alt="Perfil" class="icono-perfil">
            </div>
        </div>
    </header>

    <main class="container seccion">
        
        <header class="seccion-encabezado" style="text-align: center; margin-bottom: 40px;">
            <h2 class="titulo-vista" style="color: #003366;">Anuncios</h2>
        </header>

        <section class="formulario-anuncio">
            <!-- FORM: form-crear-anuncio -->
            <form id="form-crear-anuncio">
                <div class="info-label" style="margin-bottom: 15px;">
                    <h3 style="color: #003366; font-size: 1.5rem; font-weight: bold;">Escribir anuncio:</h3>
                </div>

                <div class="contenedor-mensaje" style="margin-bottom: 40px;">
                    <textarea
                        id="contenido-anuncio"
                        name="contenido_anuncio"
                        class="input-control"
                        rows="18"
                        style="width: 100%; border: 1px solid #000; padding: 20px; resize: none; font-family: inherit;"
                        placeholder="Escriba aquí el contenido del anuncio global..."></textarea>
                </div>

                <div class="detalle-evento-acciones" style="justify-content: flex-start; gap: 60px;">
                    <button type="submit" class="btn btn-primary" style="padding: 10px 45px; font-weight: bold;">Enviar Anuncio</button>
                    <button type="button" class="btn btn-secondary" style="padding: 10px 55px; font-weight: bold;">Cancelar</button>
                </div>
            </form>
        </section>

    </main>

    <script src="../../public/js/main.js"></script>
    <!-- <script src="/js/main.js"></script> -->

</body>
</html>
