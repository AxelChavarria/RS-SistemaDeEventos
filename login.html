<body class="login-page">

    <!-- barra superior -->
    <header class="topbar">

        <div class="topbar-contenido">
            <div class="topbar-izquierda">
                <img src="../public/assets/logos/logotec_blanco__login.png" alt="TEC" class="logo-tec">

            </div>

        </div>

    </header>

    <h1 style="text-align: center; margin-bottom: 10px; margin-top: 40px; font-size: 3.5em;">
        Bienvenido
    </h1>

    <!-- contenedor principal centrado -->
    <main class="login-container">

        <!-- tarjeta de login -->
        <div class="card card-login">

                <!-- bloque visual del tec -->
                <div class="login-header">
                    <h1 class="login-logo">TEC</h1>
                </div>

                <h2 class="titulo-login">
                    Sistema de Eventos
                </h2>

            <!-- formulario de login -->
            <form id="form-login" method="post">

                <div class="form-group">
                    <input 
                        type="email" 
                        id ="correo"
                        name="correo"
                        placeholder="correo@estudiantec.itcr/.ac.cr"
                        class="input-control"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        id="contrasena"
                        name="contrasena"
                        placeholder="********"
                        class="input-control"
                    >
                </div>

                <!-- boton principal -->
                <button type="submit" class="btn btn-primary btn-full">
                    Iniciar sesión
                </button>


                <!--Aqui debo poner la logica para que se conecte al html de cambia contraseña-->
                <!--IMPORTANTE: Por ahora lo voy a omitir, no lo veo como indispensable -->
                <p class="texto-secundario">
                Olvidó su contraseña?
                </p>

                <!-- boton de registro -->
                

            </form>

            <a href="views/registro.html" class="btn btn-secondary btn-full" right>
                Registrar cuenta
            </a>
        </div>

    </main>

    <!--IMPORTANTE js para desarrollo -->
    <script type="module" src="../main.js"></script>

    <!-- js para backend -->
    <!-- <script src="/js/main.js"></script> -->

</body>
</html>
